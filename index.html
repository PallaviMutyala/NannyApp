<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <body>
    <div id="root">
      <div id="app-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#f5f3ff;font-family:system-ui,sans-serif">

    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
